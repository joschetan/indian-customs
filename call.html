<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customs Secure Voice Terminal</title>
  <!-- Firebase Core SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    html, body {
      height: 100%;
      background: #111;
      color: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px 20px;
    }

    /* State Layouts */
    .status-container {
      text-align: center;
      margin-top: 40px;
      z-index: 10;
    }
    .status-title {
      font-size: 24px;
      font-weight: bold;
      color: #075E54;
      margin-bottom: 10px;
    }
    .status-text {
      font-size: 16px;
      color: #aaa;
    }
    .timer-text {
      font-size: 32px;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: #25D366;
      margin-top: 20px;
      display: none;
    }

    /* Action Panels */
    .action-panel {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 10;
    }
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .btn-accept { background: #25D366; color: white; display: none; }
    .btn-dial { background: #075E54; color: white; display: none; }
    .btn-end { background: #ea003b; color: white; margin-top: auto; }

    /* HARDCORE FIX: Pure Black Touch-Proof Anti-Ear Accidental parda */
    #touchBlockerOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.97); /* 97% Dim/Black effect */
      z-index: 9999;
      pointer-events: auto; /* Absorbs all touches from ears/cheeks */
    }
    #pardaEndCallBtn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 280px;
      padding: 15px;
      background: #ea003b;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto; /* Only this button can be pressed */
      box-shadow: 0 4px 15px rgba(234,0,59,0.4);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Pure Black Touch Blocker System Panel -->
  <div id="touchBlockerOverlay">
      <div id="pardaTimerDisplay" style="text-align:center; margin-top:100px; font-size:36px; font-family:monospace; color:#25D366; font-weight:bold;">00:00</div>
      <p style="text-align:center; color:#555; font-size:12px; margin-top:10px;">Touch Locked (Anti-Accidental Mode Active)</p>
      <button id="pardaEndCallBtn" onclick="endCurrentCallSync()">🔴 End Call</button>
  </div>

  <!-- Main UI Display -->
  <div class="status-container">
      <div class="status-title" id="partyIdentity">Terminal Connection</div>
      <div class="status-text" id="runtimeStatus">Initializing Secure Line...</div>
      <div class="timer-text" id="liveCallTimer">00:00</div>
  </div>

  <div class="action-panel">
      <button class="btn btn-accept" id="acceptBtn" onclick="acceptIncomingCall()">📞 Accept Call</button>
      <button class="btn btn-dial" id="dialBtn" onclick="startOutgoingDialingSequence()">🔊 Start Secure Call</button>
      <button class="btn btn-end" id="mainEndBtn" onclick="endCurrentCallSync()">🔴 End Call</button>
  </div>

  <!-- Audio Node Elements for WebRTC Streams -->
  <audio id="remoteAudio" autoplay></audio>

<script>
// --- FIREBASE INITIALIZATION ENGINE ---
const firebaseConfig = {
  apiKey: "AIzaSyAbwWS1bAn6ZNPEZ9TfeeBY4C6QosdtXiU",
  authDomain: "indian-customs-c6a8f.firebaseapp.com",
  projectId: "indian-customs-c6a8f",
  storageBucket: "indian-customs-c6a8f.firebasestorage.app",
  messagingSenderId: "954532252846",
  appId: "1:954532252846:web:6c8eeee47fc14837b2f13f",
  measurementId: "G-4MLTB7VD3X",
  databaseURL: "https://indian-customs-c6a8f-default-rtdb.firebaseio.com"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

let USER = sessionStorage.getItem("ck_user") || "";
let OTHER_USER = USER === "Alex" ? "Gemini" : "Alex";

// WebRTC Parameters
let localStream;
let peerConnection;
let callRef = db.ref("chats/call_session");
let wakeLock = null;
let timerInterval = null;
let callSeconds = 0;

const rtcConfig = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

window.onload = function() {
    if (!USER) {
        document.getElementById("runtimeStatus").innerText = "Error: Unauthorized Session! Please login first.";
        return;
    }
    document.getElementById("partyIdentity").innerText = OTHER_USER;
    listenToCallSessionUpdates();
};

// Listen to Firebase Signaling node for tracking Calls
function listenToCallSessionUpdates() {
    callRef.on("value", async function(snapshot) {
        let data = snapshot.val() || {};
        
        // Scenario A: Fresh Idle State -> Show Dial option if nobody is calling
        if (!data.status) {
            document.getElementById("runtimeStatus").innerText = "Line Secure. Ready to call.";
            document.getElementById("dialBtn").style.display = "block";
            document.getElementById("acceptBtn").style.display = "none";
            resetTimerEngine();
            return;
        }

        // Scenario B: Incoming call signaling triggered by target peer
        if (data.status === "dialing" && data.caller === OTHER_USER) {
            document.getElementById("runtimeStatus").innerText = "Incoming Secure Call...";
            document.getElementById("acceptBtn").style.display = "block";
            document.getElementById("dialBtn").style.display = "none";
            return;
        }

        // Scenario C: Outgoing call sequence currently ringing target peer
        if (data.status === "dialing" && data.caller === USER) {
            document.getElementById("runtimeStatus").innerText = "Ringing secure terminal...";
            document.getElementById("dialBtn").style.display = "none";
            return;
        }

        // Scenario D: Connection accepted -> Initiate WebRTC Audio handshake routing
        if (data.status === "active") {
            document.getElementById("acceptBtn").style.display = "none";
            document.getElementById("dialBtn").style.display = "none";
            
            if (data.receiver === USER && !peerConnection) {
                // Receiver processes answer handshake routing parameters
                document.getElementById("runtimeStatus").innerText = "Connecting handshake...";
            }
            
            if (!timerInterval) {
                startLiveCallTimerEngine();
                activateScreenWakeLockAPI();
                activateTouchBlockerParda();
            }
        }
    });

    // Handle incoming ICE Candidates from WebRTC pipelines
    callRef.child("candidates").child(OTHER_USER).on("child_added", function(snapshot) {
        let candidate = new RTCIceCandidate(snapshot.val());
        if (peerConnection) {
            peerConnection.addIceCandidate(candidate).catch(e => console.log(e));
        }
    });

    // Handle incoming Remote SDP descriptions
    callRef.child("sdp").child(OTHER_USER).on("value", async function(snapshot) {
        let sdpData = snapshot.val();
        if (!sdpData || !peerConnection) return;
        
        if (sdpData.type === "offer" && USER === OTHER_USER) {
            // Safety parsing logic fallback parameter routes
        } else if (sdpData.type === "answer") {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(sdpData));
        }
    });
}

// Outgoing Call Setup Trigger
async function startOutgoingDialingSequence() {
    document.getElementById("dialBtn").style.display = "none";
    document.getElementById("runtimeStatus").innerText = "Initializing audio streams...";
    
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        setupPeerConnectionObject();
        
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        
        let offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        await callRef.set({
            status: "dialing",
            caller: USER,
            receiver: OTHER_USER
        });
        
        await callRef.child("sdp").child(USER).set({
            type: offer.type,
            sdp: offer.sdp
        });
        
    } catch(err) {
        document.getElementById("runtimeStatus").innerText = "Microphone Access Denied!";
        document.getElementById("dialBtn").style.display = "block";
    }
}

// Incoming Call Accept Trigger
async function acceptIncomingCall() {
    document.getElementById("acceptBtn").style.display = "none";
    document.getElementById("runtimeStatus").innerText = "Accepting secure channel...";

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        setupPeerConnectionObject();
        
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        
        // Fetch caller offer configuration SDP from signaling node
        let offerSnap = await callRef.child("sdp").child(OTHER_USER).once("value");
        let offerSdp = offerSnap.val();
        
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offerSdp));
        let answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        
        await callRef.child("sdp").child(USER).set({
          type: answer.type,
          sdp: answer.sdp
        });

        await callRef.update({ status: "active" });
        
    } catch(err) {
        alert("Could not initialize secure audio loop: " + err.message);
        endCurrentCallSync();
    }
}

// Core WebRTC Handler Setup
function setupPeerConnectionObject() {
    peerConnection = new RTCPeerConnection(rtcConfig);
    
    // Broadcast native local ICE data parameters immediately to database
    peerConnection.onicecandidate = function(event) {
        if (event.candidate) {
            callRef.child("candidates").child(USER).push(event.candidate.toJSON());
        }
    };
    
    // Wire remote stream routing directly to background audio tag hardware
    peerConnection.ontrack = function(event) {
        document.getElementById("remoteAudio").srcObject = event.streams[0];
        document.getElementById("runtimeStatus").innerText = "Secure Line Active";
    };
}

// TIMER ENGINE HANDLER
function startLiveCallTimerEngine() {
    callSeconds = 0;
    let timerView = document.getElementById("liveCallTimer");
    let pardaTimerView = document.getElementById("pardaTimerDisplay");
    timerView.style.display = "block";
    
    timerInterval = setInterval(() => {
        callSeconds++;
        let mins = String(Math.floor(callSeconds / 60)).padStart(2, '0');
        let secs = String(callSeconds % 60).padStart(2, '0');
        let formattedTime = `${mins}:${secs}`;
        
        timerView.innerText = formattedTime;
        pardaTimerView.innerText = formattedTime;
    }, 1000);
}

function resetTimerEngine() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    callSeconds = 0;
    document.getElementById("liveCallTimer").style.display = "none";
    document.getElementById("liveCallTimer").innerText = "00:00";
    document.getElementById("pardaTimerDisplay").innerText = "00:00";
}

// ANTI ACCIDENTAL TOUCH SYSTEM PARDA OVERLAY
function activateTouchBlockerParda() {
    document.getElementById("touchBlockerOverlay").style.display = "block";
}

function deactivateTouchBlockerParda() {
    document.getElementById("touchBlockerOverlay").style.display = "none";
}

// WAKE LOCK INTERACTION LAYER: Forces background keep alive against system sleeps
async function activateScreenWakeLockAPI() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {
        console.log("WakeLock implementation context error bounds ignored safely.");
    }
}

function releaseScreenWakeLockAPI() {
    if (wakeLock !== null) {
        wakeLock.release().then(() => { wakeLock = null; });
    }
}

// Synchronous Kill Chain System: Completely dismantles pipeline on terminate
async function endCurrentCallSync() {
    resetTimerEngine();
    deactivateTouchBlockerParda();
    releaseScreenWakeLockAPI();

    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
    }
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }

    // Completely wipe connection variables from signaling nodes cleanly
    await callRef.set(null);
    
    document.getElementById("runtimeStatus").innerText = "Call ended.";
    setTimeout(() => {
        window.close(); // Automatically attempts to shut tab safely
    }, 800);
}
</script>
</body>
</html>
