<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Indian-Customs</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    html, body {
      height: 100%;
      background: #e5ddd5;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      height: 60px;
      background: #075E54;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,.2);
      flex-shrink: 0;
    }

    .header .right {
      display: flex;
      gap: 12px;
    }

    .header button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .header button:hover {
      opacity: 0.8;
    }

    /* Dynamic Search Bar Style */
    #searchBar {
      padding: 6px 12px;
      border-radius: 15px;
      border: none;
      outline: none;
      font-size: 14px;
      width: 40%;
      max-width: 250px;
    }

    /* Chat Area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      scroll-behavior: smooth;
    }

    /* Message Bubble */
    .message {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      position: relative;
      overflow-wrap: break-word;
      word-break: break-word;
      animation: fade .2s ease-out;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }

    .me {
      margin-left: auto;
      background: #DCF8C6;
    }

    .other {
      background: white;
      margin-right: auto;
    }

    .user {
      font-weight: bold;
      color: #075E54;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .time {
      font-size: 10px;
      color: #777;
      text-align: right;
      margin-top: 4px;
    }

    /* Reply Inside Chat Bubble */
    .replyBox {
      background: rgba(0,0,0,.04);
      border-left: 4px solid #34B7F1;
      padding: 6px;
      margin-bottom: 6px;
      border-radius: 4px;
      font-size: 12px;
      color: #444;
    }

    /* Images */
    .chatImage {
      max-width: 100%;
      width: 240px;
      height: auto;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 5px;
      display: block;
    }

    /* Reply Bar Header Above Footer */
    #replyPreview {
      display: none;
      background: #f0f0f0;
      padding: 8px 15px;
      font-size: 13px;
      border-left: 4px solid #075E54;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #ddd;
    }

    /* Footer Container */
    .footer {
      height: 60px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
      flex-shrink: 0;
    }

    .footer input[type=text]{
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 20px;
      padding: 0 15px;
      font-size: 15px;
      outline: none;
    }

    /* Media Buttons Customization */
    .footer .media-btn {
      background: transparent;
      color: #555;
      width: 40px;
      height: 40px;
      font-size: 22px;
    }

    /* Main Send Button */
    .footer .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #25D366;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    .footer button:hover {
      transform: scale(1.05);
    }

    /* Full Image Viewer Modal */
    #imageViewer {
      display: none;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.95);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #imageViewer img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 4px;
      object-fit: contain;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
    }

    /* Animation */
    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile Responsiveness */
    @media(max-width:600px){
      .message { max-width: 85%; }
      .header { font-size: 18px; height: 55px; }
      .footer { height: 55px; }
      .footer input[type=text] { font-size: 14px; height: 36px; }
      #searchBar { width: 50%; }
    }
  </style>
</head>

<body>

<div id="loginModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#e5ddd5; display:flex; justify-content:center; align-items:center; z-index:10000;">
    <div style="background:white; padding:30px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.15); text-align:center; width:90%; max-width:350px;">
        <h3 style="color:#075E54; margin-bottom:15px; font-family:Arial,sans-serif;">Welcome To Indian-Customs</h3>
        <input type="text" id="usernameInput" placeholder="Enter Username..." style="width:100%; padding:10px 15px; border:1px solid #ccc; border-radius:20px; outline:none; font-size:16px; margin-bottom:10px; text-align:center;">
        <p id="errorMessage" style="color:red; font-size:13px; margin-bottom:15px; display:none; font-weight:bold;"></p>

</div>

</div>

<div id="replyPreview"></div>

<div id="chat"></div>

    <button onclick="openCamera()" class="media-btn" title="Camera">📷</button>

    <input type="text" id="message" placeholder="Type a message..." autocomplete="off"
