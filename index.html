<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian Customs</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    html, body {
      height: 100%;
      background: #e5ddd5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* Header Container */
    .header {
      height: 60px;
      background: #075E54;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,.2);
      flex-shrink: 0;
    }
    .header .right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .header button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    #searchBar {
      padding: 6px 12px;
      border-radius: 15px;
      border: none;
      outline: none;
      font-size: 14px;
      width: 40%;
      max-width: 250px;
    }
    /* Chat Area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      scroll-behavior: smooth;
      transition: opacity 0.05s ease-in-out;
    }
    /* Message Bubble */
    .message {
      max-width: 75%;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      position: relative;
      overflow-wrap: break-word;
      word-break: break-word;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }
    .me { margin-left: auto; background: #DCF8C6; }
    .other { background: white; margin-right: auto; }
    .user { font-weight: bold; color: #075E54; margin-bottom: 4px; font-size: 13px; }
    .time { font-size: 10px; color: #777; text-align: right; margin-top: 4px; }
    .replyBox {
      background: rgba(0,0,0,.04);
      border-left: 4px solid #34B7F1;
      padding: 6px;
      margin-bottom: 6px;
      border-radius: 4px;
      font-size: 12px;
      color: #444;
    }
    .chatImage {
      max-width: 100%;
      width: 240px;
      height: auto;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 5px;
      display: block;
    }
    #replyPreview {
      display: none;
      background: #f0f0f0;
      padding: 8px 15px;
      font-size: 13px;
      border-left: 4px solid #075E54;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #ddd;
    }
    /* Footer controls */
    .footer {
      height: 60px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
      flex-shrink: 0;
      z-index: 999;
    }
    .footer input[type=text]{
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 20px;
      padding: 0 15px;
      font-size: 15px;
      outline: none;
    }
    .footer .media-btn {
      background: transparent !important;
      border: none !important;
      color: #555 !important;
      width: 40px !important;
      height: 40px !important;
      font-size: 22px !important;
      cursor: pointer !important;
      display: inline-block !important;
    }
    .footer .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #25D366;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #imageViewer {
      display: none;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,.95);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    #imageViewer img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 4px;
      object-fit: contain;
    }
    @media(max-width:600px){
      .message { max-width: 85%; }
      .header { font-size: 18px; height: 55px; }
      .footer { height: 55px; }
      .footer input[type=text] { font-size: 14px; height: 36px; }
      #searchBar { width: 50%; }
    }
  </style>
</head>
